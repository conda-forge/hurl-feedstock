{% set version = "8.0.1" %}

package:
  name: hurl
  version: {{ version }}

source:
  url: https://github.com/Orange-OpenSource/hurl/archive/{{ version }}.tar.gz
  sha256: d5ea72ed489b9de319d0306d7b23728c4d284ac505adeb06c297ff5da1cf0de8
  patches:
    # Path for downgrading Rust version 1.91.1 to 1.91.0
    - cargo-toml-rust-version-1.91.0.patch
    # Patch for libxml-0.3.8 default_binding.rs <https://github.com/Orange-OpenSource/hurl/issues/4288>
    - cargo-toml-libxml-0.3.8.patch   # [win]

build:
  number: 0

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - openssl
    - libxml2-devel
    - libcurl
  run:

test:
  commands:
    - hurl --version
    - hurlfmt --version
    - echo HEAD https://hurl.dev | hurl --include --no-color

about:
  home: https://hurl.dev
  summary: Run and Test HTTP Requests with plain text and curl
  description: |
    Hurl is a command line tool that runs HTTP requests defined in a simple plain text format.

    It can chain requests, capture values and evaluate queries on headers and body response. Hurl is very 
    versatile: it can be used for both fetching data and testing HTTP sessions.

    Hurl makes it easy to work with HTML content, REST / SOAP / GraphQL APIs, or any other XML / JSON based APIs.

  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  doc_url: https://hurl.dev
  dev_url: https://github.com/Orange-OpenSource/hurl


extra:
  recipe-maintainers:
    - jcamiel
